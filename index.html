<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบติดตามหนี้ กปภ. สาขาละหานทราย</title>
  
  <!-- โหลด Tailwind CSS สำหรับตกแต่งหน้าเว็บ -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- โหลด FontAwesome สำหรับไอคอน -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- โหลด React และ ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- โหลด Babel สำหรับแปลงโค้ด JSX ให้ทำงานในเบราว์เซอร์ได้โดยตรง -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @media print { .no-print { display: none !important; } }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    // --- ระบบแปลงไอคอน (Mock Icons) เพื่อให้ใช้งานได้ในไฟล์เดียว ---
    const createFAIcon = (faClass) => ({ size = 24, className = '', fill }) => {
      // ใช้ color แทน fill สำหรับระบบ FontAwesome
      const colorStyle = (fill && fill !== 'none') ? fill : undefined;
      return <i className={`fas ${faClass} ${className}`} style={{ fontSize: size, color: colorStyle }}></i>;
    };
    
    const MapPin = createFAIcon('fa-map-marker-alt');
    const Search = createFAIcon('fa-search');
    const Plus = createFAIcon('fa-plus');
    const Phone = createFAIcon('fa-phone');
    const AlertTriangle = createFAIcon('fa-exclamation-triangle');
    const Clock = createFAIcon('fa-clock');
    const BarChart3 = createFAIcon('fa-chart-bar');
    const User = createFAIcon('fa-user');
    const Navigation = createFAIcon('fa-location-arrow');
    const Save = createFAIcon('fa-save');
    const X = createFAIcon('fa-times');
    const FileText = createFAIcon('fa-file-alt');
    const Calendar = createFAIcon('fa-calendar-alt');
    const CheckCircle2 = createFAIcon('fa-check-circle');
    const MapIcon = createFAIcon('fa-map');
    const Filter = createFAIcon('fa-filter');
    const LogOut = createFAIcon('fa-sign-out-alt');
    const Edit = createFAIcon('fa-edit');
    const Trash2 = createFAIcon('fa-trash-alt');
    const Camera = createFAIcon('fa-camera');
    const Printer = createFAIcon('fa-print');
    const PieChart = createFAIcon('fa-chart-pie');
    const TrendingUp = createFAIcon('fa-chart-line');
    const Download = createFAIcon('fa-download');
    const UploadCloud = createFAIcon('fa-cloud-upload-alt');
    const FileSpreadsheet = createFAIcon('fa-file-excel');
    const FileDown = createFAIcon('fa-file-download');
    const Users = createFAIcon('fa-users');
    const UserPlus = createFAIcon('fa-user-plus');

    // --- Mock Data ---
    const initialDebtors = [
      { 
        id: 1, accountId: '10293847', name: 'นายสมชาย ใจดี', address: '123 ม.1 ต.ละหานทราย อ.ละหานทราย จ.บุรีรัมย์ 31170', phone: '081-234-5678', 
        accountStatus: 'ยกเลิกสัญญา', overdueBills: 2, amount: 15400.50, operationStatus: 'ระหว่างติดตาม', trackingResult: 'นัดชำระ',
        trackingDate: '2026-03-25', note: 'ติดต่อญาติแจ้งว่าไปทำงานต่างจังหวัด จะโอนเงินให้สิ้นเดือน', lat: 14.4167, lng: 102.8667,
        collectorEmail: 'staff1@pwa.co.th', photo1: '', photo2: '', month: '2026-03',
        invoices: [
          { invoiceNo: 'INV-69001', billingMonth: '2026-01', amount: 7400.00 },
          { invoiceNo: 'INV-69088', billingMonth: '2026-02', amount: 8000.50 }
        ]
      },
      { 
        id: 2, accountId: '10293848', name: 'นางสาววิภา พรประเสริฐ', address: '45/2 ม.3 ต.ตาจง อ.ละหานทราย จ.บุรีรัมย์ 31170', phone: '089-876-5432', 
        accountStatus: 'งดจ่ายน้ำ', overdueBills: 2, amount: 4200.00, operationStatus: 'ติดตามแล้ว', trackingResult: 'ชำระเงิน',
        trackingDate: '2026-03-10', note: 'ชำระผ่านแอป Krungthai NEXT เรียบร้อย', lat: 14.4250, lng: 102.8550,
        collectorEmail: 'staff1@pwa.co.th', photo1: '', photo2: '', month: '2026-03',
        invoices: [
          { invoiceNo: 'INV-69012', billingMonth: '2026-02', amount: 2000.00 },
          { invoiceNo: 'INV-69105', billingMonth: '2026-03', amount: 2200.00 }
        ]
      },
      { 
        id: 3, accountId: '10293849', name: 'นายมานะ ขยันงาน', address: '789 ม.5 ต.โคกว่าน อ.ละหานทราย จ.บุรีรัมย์ 31170', phone: '086-555-4433', 
        accountStatus: 'ปกติ (ค้างชำระ)', overdueBills: 1, amount: 850.25, operationStatus: 'ติดตามแล้ว', trackingResult: 'ชำระเงิน',
        trackingDate: '2026-02-15', note: 'ชำระที่เคาน์เตอร์ กปภ.', lat: 14.4010, lng: 102.8712,
        collectorEmail: 'staff2@pwa.co.th', photo1: '', photo2: '', month: '2026-02',
        invoices: [
          { invoiceNo: 'INV-68999', billingMonth: '2026-02', amount: 850.25 }
        ]
      },
    ];

    const initialUsers = [
      { id: 1, name: 'สมปอง สายติดตาม', email: 'staff1@pwa.co.th', role: 'เจ้าหน้าที่ลงพื้นที่', phone: '080-111-2222', status: 'ใช้งานปกติ' },
      { id: 2, name: 'จินตนา การเงิน', email: 'staff2@pwa.co.th', role: 'เจ้าหน้าที่ธุรการ/การเงิน', phone: '080-333-4444', status: 'ใช้งานปกติ' },
      { id: 3, name: 'ผู้จัดการ ละหานทราย', email: 'admin@pwa.co.th', role: 'ผู้ดูแลระบบ', phone: '080-999-9999', status: 'ใช้งานปกติ' }
    ];

    // -----------------------------------------------------------
    const GOOGLE_SHEETS_API_URL = ''; 

    const App = () => {
      // --- States ---
      const [currentUser, setCurrentUser] = useState(null);
      const [loginEmail, setLoginEmail] = useState('');
      
      const [debtors, setDebtors] = useState(initialDebtors);
      const [users, setUsers] = useState(initialUsers); 
      const [isSyncing, setIsSyncing] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [view, setView] = useState('dashboard'); 
      const [filterOperation, setFilterOperation] = useState('ทั้งหมด');
      
      const [selectedDebtor, setSelectedDebtor] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [formData, setFormData] = useState({});
      const [isModalOpen, setIsModalOpen] = useState(false);

      const [tempInvoice, setTempInvoice] = useState({ invoiceNo: '', billingMonth: '', amount: '' });
      
      const [newUser, setNewUser] = useState({ name: '', email: '', role: 'ผู้ใช้งานทั่วไป (User)', phone: '' });
      const [editingUserId, setEditingUserId] = useState(null);

      // --- Auth Functions ---
      const handleLogin = (e) => {
        e.preventDefault();
        if (loginEmail.endsWith('@pwa.co.th')) {
          setCurrentUser(loginEmail);
        } else {
          alert('กรุณาใช้อีเมลของประปาส่วนภูมิภาค (@pwa.co.th) เท่านั้นในการเข้าสู่ระบบ');
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setLoginEmail('');
      };

      // --- File Handling ---
      const handleImageChange = (e, photoKey) => {
        const file = e.target.files[0];
        if (file) {
          const imageUrl = URL.createObjectURL(file);
          setFormData(prev => ({ ...prev, [photoKey]: imageUrl }));
        }
      };

      const syncToGoogleSheets = async (action, data) => {
        if (!GOOGLE_SHEETS_API_URL) return;
        setIsSyncing(true);
        try {
          await fetch(GOOGLE_SHEETS_API_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, data })
          });
          console.log('ส่งคำสั่งไป Google Sheets สำเร็จ:', action);
        } catch (error) {
          console.error("เกิดข้อผิดพลาดในการซิงค์ข้อมูล:", error);
        } finally {
          setIsSyncing(false);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.name.endsWith('.csv')) {
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const text = event.target.result;
              const rows = text.split('\n');
              const newImportedData = [];

              for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const cols = rows[i].split(',').map(c => c.trim().replace(/^"|"$/g, '')); 
                
                if (cols.length >= 3 && cols[0]) {
                  const accountId = cols[0];
                  const name = cols[1] || 'ไม่ระบุชื่อ';
                  const invoiceNo = cols[2] || `INV-CSV-${i}`;
                  const billingMonth = cols[3] || new Date().toISOString().substring(0, 7);
                  const amount = parseFloat(cols[4] || cols[2]) || 0; 

                  newImportedData.push({
                    accountId, 
                    name, 
                    address: 'ต.ละหานทราย (นำเข้า)', 
                    phone: '-',
                    accountStatus: 'ปกติ (ค้างชำระ)', 
                    operationStatus: 'ระหว่างติดตาม', 
                    trackingResult: 'ยังไม่พบตัว',
                    trackingDate: '', 
                    note: 'นำเข้าจากไฟล์ CSV', 
                    lat: 14.41, 
                    lng: 102.86, 
                    collectorEmail: currentUser, 
                    month: new Date().toISOString().substring(0, 7),
                    invoices: [{ invoiceNo, billingMonth, amount }]
                  });
                }
              }

              if (newImportedData.length > 0) {
                setDebtors(prev => {
                  const updatedDebtors = [...prev];
                  newImportedData.forEach(newItem => {
                    const existingIndex = updatedDebtors.findIndex(d => d.accountId === newItem.accountId);
                    if (existingIndex >= 0) {
                      const existing = updatedDebtors[existingIndex];
                      existing.invoices = [...(existing.invoices || []), ...newItem.invoices];
                      existing.overdueBills = existing.invoices.length;
                      existing.amount = existing.invoices.reduce((sum, inv) => sum + inv.amount, 0);
                    } else {
                      updatedDebtors.unshift({
                        ...newItem,
                        id: Date.now() + Math.random(),
                        overdueBills: newItem.invoices.length,
                        amount: newItem.invoices[0].amount
                      });
                    }
                  });
                  syncToGoogleSheets('import_bulk', updatedDebtors);
                  return updatedDebtors;
                });

                alert(`นำเข้าและประมวลผลข้อมูลสำเร็จ (ควบรวมตามเลขผู้ใช้น้ำ)`);
                setView('list');
              } else {
                alert('ไม่พบข้อมูลในไฟล์ หรือรูปแบบคอลัมน์ไม่ถูกต้อง');
              }
            } catch (err) {
              alert('เกิดข้อผิดพลาดในการอ่านไฟล์ CSV');
              console.error(err);
            }
          };
          
          reader.readAsText(file, 'TIS-620'); 
        } else {
          alert('ขณะนี้ระบบรองรับเฉพาะการนำเข้าไฟล์รูปแบบ .csv เท่านั้น');
        }
      };

      const exportToCSV = () => {
        const headers = ['เลขผู้ใช้น้ำ', 'ชื่อ-สกุล', 'สถานะสัญญา', 'ค้าง(ใบ)', 'ยอดเงิน(บาท)', 'สถานะติดตาม', 'ผลการติดตาม', 'เดือน'];
        const csvContent = [
          headers.join(','),
          ...debtors.map(d => [
            d.accountId, `"${d.name}"`, d.accountStatus, d.overdueBills, d.amount, d.operationStatus, d.trackingResult, d.month
          ].join(','))
        ].join('\n');

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `รายงานหนี้_กปภ_ละหานทราย_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handlePrintPDF = () => {
        window.print();
      };

      // --- Invoice Sub-form Handling ---
      const handleAddTempInvoice = () => {
        if (!tempInvoice.invoiceNo || !tempInvoice.amount || !tempInvoice.billingMonth) {
          alert('กรุณากรอกข้อมูลใบแจ้งหนี้ให้ครบ (หมายเลข, เดือนปี, ยอดเงิน)');
          return;
        }
        const newInvoice = { ...tempInvoice, amount: parseFloat(tempInvoice.amount) };
        const updatedInvoices = [...(formData.invoices || []), newInvoice];
        const newTotalAmount = updatedInvoices.reduce((sum, inv) => sum + inv.amount, 0);
        
        setFormData({
          ...formData,
          invoices: updatedInvoices,
          overdueBills: updatedInvoices.length,
          amount: newTotalAmount
        });
        setTempInvoice({ invoiceNo: '', billingMonth: '', amount: '' });
      };

      const handleRemoveInvoice = (indexToRemove) => {
        const updatedInvoices = formData.invoices.filter((_, idx) => idx !== indexToRemove);
        const newTotalAmount = updatedInvoices.reduce((sum, inv) => sum + inv.amount, 0);
        setFormData({
          ...formData,
          invoices: updatedInvoices,
          overdueBills: updatedInvoices.length,
          amount: newTotalAmount
        });
      };

      // --- CRUD Operations ---
      const openForm = (debtor = null) => {
        setTempInvoice({ invoiceNo: '', billingMonth: '', amount: '' });
        if (debtor) {
          setEditingId(debtor.id);
          setFormData({ ...debtor, invoices: debtor.invoices ? [...debtor.invoices] : [] });
        } else {
          setEditingId(null);
          setFormData({
            accountId: '', name: '', address: '', phone: '', accountStatus: 'ปกติ (ค้างชำระ)',
            overdueBills: 0, amount: 0, operationStatus: 'ระหว่างติดตาม', trackingResult: 'ยังไม่พบตัว',
            trackingDate: new Date().toISOString().split('T')[0], note: '', lat: '', lng: '', photo1: '', photo2: '',
            invoices: [] 
          });
        }
        setView('form');
        setIsModalOpen(false);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const month = formData.trackingDate ? formData.trackingDate.substring(0, 7) : new Date().toISOString().substring(0, 7);
        
        if (editingId) {
          const savedDebtor = { ...formData, id: editingId, month, collectorEmail: currentUser };
          setDebtors(debtors.map(d => d.id === editingId ? savedDebtor : d));
          alert('อัปเดตข้อมูลสำเร็จ');
          syncToGoogleSheets('update', savedDebtor);
        } else {
          const existingDebtorIndex = debtors.findIndex(d => d.accountId === formData.accountId);
          
          if (existingDebtorIndex >= 0) {
            if (window.confirm(`พบเลขผู้ใช้น้ำ ${formData.accountId} ในระบบแล้ว คุณต้องการนำใบแจ้งหนี้นี้ไปรวมกับผู้ใช้น้ำเดิมหรือไม่?`)) {
              const existing = debtors[existingDebtorIndex];
              const mergedInvoices = [...(existing.invoices || []), ...(formData.invoices || [])];
              const updatedDebtor = {
                ...existing,
                phone: formData.phone || existing.phone, 
                invoices: mergedInvoices,
                overdueBills: mergedInvoices.length,
                amount: mergedInvoices.reduce((sum, inv) => sum + inv.amount, 0),
                trackingDate: formData.trackingDate,
                operationStatus: formData.operationStatus,
                note: formData.note ? `${existing.note} | ${formData.note}` : existing.note
              };
              
              const newDebtors = [...debtors];
              newDebtors[existingDebtorIndex] = updatedDebtor;
              setDebtors(newDebtors);
              alert('รวมข้อมูลเข้ากับประวัติเดิมสำเร็จ');
              syncToGoogleSheets('update', updatedDebtor);
            } else {
              return; 
            }
          } else {
            const savedDebtor = { 
              ...formData, 
              id: Date.now(), 
              month, 
              collectorEmail: currentUser,
              overdueBills: formData.invoices ? formData.invoices.length : 0,
              amount: formData.invoices ? formData.invoices.reduce((sum, inv) => sum + inv.amount, 0) : 0
            };
            setDebtors([savedDebtor, ...debtors]);
            alert('บันทึกข้อมูลใหม่สำเร็จ');
            syncToGoogleSheets('add', savedDebtor);
          }
        }
        setView('list');
      };

      const handleDelete = (id) => {
        if (window.confirm('คุณแน่ใจหรือไม่ที่จะลบข้อมูลนี้? การกระทำนี้ไม่สามารถย้อนกลับได้')) {
          setDebtors(debtors.filter(d => d.id !== id));
          setIsModalOpen(false);
          syncToGoogleSheets('delete', { id });
        }
      };

      const handleClearAllData = () => {
        if (window.confirm('⚠️ คำเตือน: คุณต้องการลบข้อมูลลูกหนี้ "ทั้งหมด" ออกจากระบบใช่หรือไม่?\n\n(เหมาะสำหรับล้างข้อมูลที่ทดสอบนำเข้ามา การกระทำนี้ไม่สามารถย้อนกลับได้)')) {
          setDebtors([]);
          syncToGoogleSheets('delete_all', {});
          alert('ล้างข้อมูลทั้งหมดเรียบร้อยแล้ว');
        }
      };

      const handleSaveUser = (e) => {
        e.preventDefault();
        if (!newUser.name || !newUser.email) return;
        
        if (editingUserId) {
          setUsers(users.map(u => u.id === editingUserId ? { ...u, ...newUser } : u));
          alert('อัปเดตข้อมูลผู้ใช้งานสำเร็จ');
        } else {
          setUsers([...users, { ...newUser, id: Date.now(), status: 'ใช้งานปกติ' }]);
          alert('เพิ่มผู้ใช้งานใหม่สำเร็จ');
        }
        
        setNewUser({ name: '', email: '', role: 'ผู้ใช้งานทั่วไป (User)', phone: '' });
        setEditingUserId(null);
      };

      const handleEditUserClick = (u) => {
        setEditingUserId(u.id);
        setNewUser({ name: u.name, email: u.email, role: u.role, phone: u.phone });
      };

      const handleDeleteUser = (id) => {
        if (window.confirm('คุณแน่ใจหรือไม่ที่จะลบผู้ใช้งานรายนี้?')) {
          setUsers(users.filter(u => u.id !== id));
        }
      };

      const handleCancelEditUser = () => {
        setEditingUserId(null);
        setNewUser({ name: '', email: '', role: 'ผู้ใช้งานทั่วไป (User)', phone: '' });
      };

      // --- Calculations & Stats ---
      const stats = useMemo(() => {
        const totalAmount = debtors.reduce((acc, curr) => acc + curr.amount, 0);
        const trackingAmount = debtors.filter(d => d.operationStatus === 'ระหว่างติดตาม').reduce((acc, curr) => acc + curr.amount, 0);
        const completedAmount = debtors.filter(d => d.operationStatus === 'ติดตามแล้ว').reduce((acc, curr) => acc + curr.amount, 0);
        const completedCount = debtors.filter(d => d.operationStatus === 'ติดตามแล้ว').length;
        const trackingCount = debtors.filter(d => d.operationStatus === 'ระหว่างติดตาม').length;
        return { totalAmount, trackingAmount, completedAmount, completedCount, trackingCount, totalCount: debtors.length };
      }, [debtors]);

      const monthlyStats = useMemo(() => {
        const groups = {};
        debtors.forEach(d => {
          const m = d.month || 'ไม่ระบุ';
          if (!groups[m]) groups[m] = { month: m, totalAmount: 0, collectedAmount: 0, count: 0, collectedCount: 0 };
          groups[m].totalAmount += d.amount;
          groups[m].count += 1;
          if (d.operationStatus === 'ติดตามแล้ว') {
            groups[m].collectedAmount += d.amount;
            groups[m].collectedCount += 1;
          }
        });
        return Object.values(groups).sort((a, b) => b.month.localeCompare(a.month));
      }, [debtors]);

      const filteredDebtors = debtors.filter(d => {
        const matchSearch = d.name.includes(searchTerm) || d.accountId.includes(searchTerm);
        const matchFilter = filterOperation === 'ทั้งหมด' || d.operationStatus === filterOperation;
        return matchSearch && matchFilter;
      });

      // ==========================================
      // VIEW: LOGIN SCREEN
      // ==========================================
      if (!currentUser) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans">
            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-blue-600">
              <div className="text-center mb-8">
                <div className="bg-blue-100 p-4 rounded-full inline-block mb-4">
                  <MapIcon className="text-blue-700" size={40} />
                </div>
                <h1 className="text-2xl font-bold text-slate-800">PWA Lahasai</h1>
                <h2 className="text-xl font-bold text-slate-700 mt-1">Debt Collection</h2>
                <p className="text-slate-500 text-sm mt-3">ระบบติดตามหนี้ กปภ. สาขาละหานทราย</p>
              </div>
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">อีเมลผู้ใช้งาน</label>
                  <input 
                    type="email" 
                    required 
                    className="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" 
                    placeholder="staff@pwa.co.th"
                    value={loginEmail}
                    onChange={(e) => setLoginEmail(e.target.value)}
                  />
                </div>
                <button type="submit" className="w-full bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition-colors shadow-md">
                  เข้าสู่ระบบ
                </button>
              </form>
            </div>
          </div>
        );
      }

      // ==========================================
      // VIEW: INDIVIDUAL REPORT (PRINTABLE PDF)
      // ==========================================
      if (view === 'report-individual' && selectedDebtor) {
        return (
          <div className="min-h-screen bg-white p-8 font-sans text-black print:p-0">
            <div className="mb-6 flex justify-between items-center print:hidden bg-slate-100 p-4 rounded-lg shadow-sm border border-slate-200">
              <div className="flex gap-4">
                  <button onClick={() => setView('list')} className="text-slate-600 font-bold flex items-center gap-2 hover:text-slate-900 bg-white px-4 py-2 rounded-lg border border-slate-300 shadow-sm"><X size={18}/> ปิดรายงาน</button>
              </div>
              <div className="flex gap-3">
                  <button onClick={handlePrintPDF} className="bg-blue-700 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 shadow-md hover:bg-blue-800 transition"><Printer size={18}/> พิมพ์ / บันทึกเป็น PDF</button>
              </div>
            </div>

            <div className="max-w-4xl mx-auto border border-gray-300 p-10 print:border-none print:p-0 bg-white" style={{ minHeight: '297mm' }}>
              <div className="text-center mb-8 border-b-2 border-gray-800 pb-4">
                <h1 className="text-2xl font-bold">แบบรายงานผลการปฏิบัติงานติดตามหนี้ค่าน้ำประปา</h1>
                <p className="text-gray-800 font-bold mt-2 text-lg">การประปาส่วนภูมิภาค (กปภ.) สาขาละหานทราย</p>
              </div>

              <div className="grid grid-cols-2 gap-x-8 gap-y-4 mb-8 text-base">
                <div><span className="font-bold w-32 inline-block">เลขที่ผู้ใช้น้ำ:</span> <span className="font-mono">{selectedDebtor.accountId}</span></div>
                <div><span className="font-bold w-32 inline-block">วันที่บันทึก:</span> {selectedDebtor.trackingDate || '-'}</div>
                <div><span className="font-bold w-32 inline-block">ชื่อ-สกุล:</span> {selectedDebtor.name}</div>
                <div><span className="font-bold w-32 inline-block">สถานะสัญญา:</span> {selectedDebtor.accountStatus}</div>
                <div className="col-span-2"><span className="font-bold w-32 inline-block">ที่อยู่:</span> {selectedDebtor.address}</div>
                <div><span className="font-bold w-32 inline-block">เบอร์โทร:</span> {selectedDebtor.phone || '-'}</div>
                <div><span className="font-bold w-32 inline-block">ค้างชำระ:</span> {selectedDebtor.overdueBills} ใบ</div>
                <div className="col-span-2 bg-gray-100 p-3 font-bold text-lg rounded-lg border border-gray-200 mt-2">
                  <span className="w-40 inline-block">ยอดเงินค้างสุทธิ:</span> <span className="text-xl">฿{selectedDebtor.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
                
                {/* แสดงตารางใบแจ้งหนี้ถ้ามีข้อมูล */}
                {selectedDebtor.invoices && selectedDebtor.invoices.length > 0 && (
                   <div className="col-span-2 mt-4">
                      <h4 className="font-bold mb-2">รายละเอียดใบแจ้งหนี้:</h4>
                      <table className="w-full text-sm border-collapse border border-gray-300">
                        <thead>
                          <tr className="bg-gray-100">
                            <th className="border border-gray-300 p-2 text-left">ลำดับ</th>
                            <th className="border border-gray-300 p-2 text-left">หมายเลขใบแจ้งหนี้</th>
                            <th className="border border-gray-300 p-2 text-center">เดือนปีตั้งหนี้</th>
                            <th className="border border-gray-300 p-2 text-right">จำนวนเงิน (บาท)</th>
                          </tr>
                        </thead>
                        <tbody>
                          {selectedDebtor.invoices.map((inv, idx) => (
                            <tr key={idx}>
                              <td className="border border-gray-300 p-2 text-center">{idx + 1}</td>
                              <td className="border border-gray-300 p-2 font-mono">{inv.invoiceNo}</td>
                              <td className="border border-gray-300 p-2 text-center">{inv.billingMonth}</td>
                              <td className="border border-gray-300 p-2 text-right">{inv.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                   </div>
                )}
              </div>

              <div className="border border-gray-300 rounded-lg p-5 mb-8">
                <h3 className="font-bold text-lg mb-4 border-b pb-2">ผลการดำเนินการเจรจา</h3>
                <div className="grid grid-cols-2 gap-4 text-base">
                  <div><span className="font-bold text-gray-700">สถานะการทำงาน:</span> <span className={selectedDebtor.operationStatus === 'ติดตามแล้ว' ? 'text-green-700 font-bold' : 'text-orange-700 font-bold'}>{selectedDebtor.operationStatus}</span></div>
                  <div><span className="font-bold text-gray-700">ผลสรุปการติดตาม:</span> {selectedDebtor.trackingResult}</div>
                  <div className="col-span-2 mt-2"><span className="font-bold text-gray-700 block mb-2">บันทึกข้อความ / หมายเหตุ:</span> 
                    <div className="p-4 bg-gray-50 rounded border text-gray-800 min-h-[80px]">{selectedDebtor.note || 'ไม่มีการบันทึกหมายเหตุเพิ่มเติมจากเจ้าหน้าที่'}</div>
                  </div>
                </div>
              </div>

              <h3 className="font-bold text-lg mb-4 border-b pb-2">ภาพถ่ายประกอบรายงาน</h3>
              <div className="grid grid-cols-2 gap-6 mb-16">
                <div className="h-64 border-2 border-dashed border-gray-300 flex items-center justify-center bg-gray-50 rounded-lg overflow-hidden relative">
                  {selectedDebtor.photo1 ? <img src={selectedDebtor.photo1} alt="ภาพที่ 1" className="w-full h-full object-cover" /> : <div className="text-gray-400 text-center"><Camera size={32} className="mx-auto mb-2 opacity-50"/><p>ไม่มีภาพถ่ายที่ 1</p></div>}
                </div>
                <div className="h-64 border-2 border-dashed border-gray-300 flex items-center justify-center bg-gray-50 rounded-lg overflow-hidden relative">
                  {selectedDebtor.photo2 ? <img src={selectedDebtor.photo2} alt="ภาพที่ 2" className="w-full h-full object-cover" /> : <div className="text-gray-400 text-center"><Camera size={32} className="mx-auto mb-2 opacity-50"/><p>ไม่มีภาพถ่ายที่ 2</p></div>}
                </div>
              </div>

              <div className="grid grid-cols-2 gap-8 text-center mt-auto text-base">
                <div>
                  <p className="mb-16">ลงชื่อ .............................................................. ผู้รับทราบหนี้</p>
                  <p>( {selectedDebtor.name} )</p>
                  <p className="text-sm text-gray-500 mt-1">ผู้ใช้น้ำ/ผู้แทน</p>
                </div>
                <div>
                  <p className="mb-16">ลงชื่อ .............................................................. เจ้าหน้าที่ผู้ปฏิบัติงาน</p>
                  <p>( {selectedDebtor.collectorEmail} )</p>
                  <p className="text-sm text-gray-500 mt-1">กปภ. สาขาละหานทราย</p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // MAIN APP LAYOUT
      // ==========================================
      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20 md:pb-0">
          <style>{`@media print { .no-print { display: none !important; } }`}</style>

          {/* Header */}
          <header className="bg-blue-800 text-white p-3 md:p-4 shadow-md sticky top-0 z-50 no-print">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div className="flex items-center gap-3">
                <div className="bg-blue-600 p-2 rounded-lg hidden md:block"><MapIcon size={24} /></div>
                <div>
                  <h1 className="text-lg md:text-xl font-bold leading-none">PWA Lahasai Debt Collection</h1>
                  <p className="text-[10px] md:text-xs text-blue-200 mt-1 uppercase">ระบบบริหารจัดการหนี้ กปภ. สาขาละหานทราย</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right hidden md:block">
                  <p className="text-xs text-blue-200">ผู้ใช้งาน</p>
                  <p className="text-sm font-bold">{currentUser}</p>
                </div>
                {isSyncing && (
                  <span className="text-xs bg-yellow-400 text-yellow-900 px-2 py-1 rounded font-bold animate-pulse">กำลังซิงค์ฐานข้อมูล...</span>
                )}
                <button onClick={handleLogout} className="bg-blue-900 hover:bg-red-600 p-2 rounded-full transition-colors" title="ออกจากระบบ">
                  <LogOut size={18} />
                </button>
              </div>
            </div>
          </header>

          {/* Desktop Navigation */}
          <div className="bg-white border-b border-slate-200 shadow-sm mb-6 hidden md:block no-print">
            <div className="max-w-7xl mx-auto flex gap-4 px-6 overflow-x-auto">
              <button onClick={() => setView('dashboard')} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'dashboard' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><PieChart size={18}/> แดชบอร์ด</button>
              <button onClick={() => setView('list')} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'list' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><BarChart3 size={18}/> รายการหนี้</button>
              <button onClick={() => openForm()} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'form' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><Plus size={18}/> เพิ่มข้อมูล</button>
              <button onClick={() => setView('map')} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'map' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><MapPin size={18}/> แผนที่</button>
              <button onClick={() => setView('report-monthly')} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'report-monthly' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><FileText size={18}/> รายงานสรุป</button>
              <button onClick={() => setView('import')} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'import' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><UploadCloud size={18}/> นำเข้าข้อมูล</button>
              <button onClick={() => setView('users')} className={`py-4 font-bold border-b-4 transition-colors whitespace-nowrap flex items-center gap-2 ${view === 'users' ? 'border-blue-700 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800'}`}><Users size={18}/> จัดการผู้ใช้งาน</button>
            </div>
          </div>

          <main className="max-w-7xl mx-auto p-4 lg:px-6">
            
            {/* ==========================================
                VIEW: DASHBOARD
                ========================================== */}
            {view === 'dashboard' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
                  <h2 className="text-xl font-bold text-slate-800">ภาพรวมการจัดเก็บหนี้ สาขาละหานทราย</h2>
                  <div className="flex gap-2">
                    <button onClick={() => setView('import')} className="bg-white text-blue-700 border border-blue-200 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm transition">
                        <UploadCloud size={16}/> นำเข้า Excel/CSV
                    </button>
                    <button onClick={exportToCSV} className="bg-green-600 text-white hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-md transition">
                        <FileDown size={16}/> ส่งออกเป็น Excel
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-start">
                      <div>
                        <p className="text-slate-500 text-sm font-bold uppercase mb-1">เป้าหมายหนี้คงค้างรวม</p>
                        <h2 className="text-3xl font-black text-slate-800">฿{stats.totalAmount.toLocaleString(undefined, {minimumFractionDigits: 0})}</h2>
                      </div>
                      <div className="p-3 bg-blue-50 text-blue-600 rounded-xl"><AlertTriangle size={24}/></div>
                    </div>
                    <p className="text-xs text-slate-500 mt-4 font-medium">จากลูกหนี้ทั้งหมด {stats.totalCount} ราย</p>
                  </div>

                  <div className="bg-gradient-to-br from-green-500 to-green-600 p-6 rounded-2xl shadow-md text-white">
                    <div className="flex justify-between items-start">
                      <div>
                        <p className="text-green-100 text-sm font-bold uppercase mb-1">จัดเก็บแล้ว (Success)</p>
                        <h2 className="text-3xl font-black">฿{stats.completedAmount.toLocaleString(undefined, {minimumFractionDigits: 0})}</h2>
                      </div>
                      <div className="p-3 bg-white/20 rounded-xl"><CheckCircle2 size={24}/></div>
                    </div>
                    <div className="mt-4 flex items-center gap-2 text-sm font-bold">
                      <TrendingUp size={16}/>
                      <span>{((stats.completedAmount / stats.totalAmount) * 100).toFixed(1)}% ของยอดรวม</span>
                    </div>
                  </div>

                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-start">
                      <div>
                        <p className="text-orange-500 text-sm font-bold uppercase mb-1">อยู่ระหว่างติดตาม (Pending)</p>
                        <h2 className="text-3xl font-black text-orange-600">฿{stats.trackingAmount.toLocaleString(undefined, {minimumFractionDigits: 0})}</h2>
                      </div>
                      <div className="p-3 bg-orange-50 text-orange-600 rounded-xl"><Clock size={24}/></div>
                    </div>
                    <p className="text-xs text-slate-500 mt-4 font-medium">จำนวนลูกหนี้ {stats.trackingCount} ราย ที่ต้องลงพื้นที่</p>
                  </div>
                </div>
                
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between mt-4">
                    <div className="flex items-center gap-4">
                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl"><FileSpreadsheet size={24}/></div>
                        <div>
                            <h3 className="font-bold text-slate-800">จัดการข้อมูล (Data Management)</h3>
                            <p className="text-sm text-slate-500">สามารถนำเข้าไฟล์ .xlsx หรือ .csv และส่งออกรายงานหนี้รายเดือนเป็น Excel ได้</p>
                        </div>
                    </div>
                    <button onClick={() => setView('report-monthly')} className="text-indigo-600 font-bold hover:underline text-sm">ไปที่หน้ารายงาน →</button>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between mt-4 gap-4">
                    <div className="flex items-center gap-4 w-full md:w-auto">
                        <div className="p-3 bg-red-50 text-red-600 rounded-xl"><Trash2 size={24}/></div>
                        <div>
                            <h3 className="font-bold text-slate-800">รีเซ็ตข้อมูล (Reset Data)</h3>
                            <p className="text-sm text-slate-500">ใช้สำหรับล้างข้อมูลลูกหนี้ทั้งหมดในระบบ เพื่อเริ่มรอบใหม่หรือเคลียร์ข้อมูลทดสอบ</p>
                        </div>
                    </div>
                    <button onClick={handleClearAllData} className="w-full md:w-auto bg-white text-red-600 border border-red-200 hover:bg-red-50 px-4 py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition shadow-sm whitespace-nowrap">
                        <Trash2 size={16}/> ลบข้อมูลทั้งหมด
                    </button>
                </div>
              </div>
            )}

            {/* ==========================================
                VIEW: USERS MANAGEMENT
                ========================================== */}
            {view === 'users' && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 animate-in fade-in">
                 <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                   <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Users className="text-blue-600"/> จัดการรายชื่อผู้ใช้งานระบบ</h2>
                 </div>
                 
                 {/* ฟอร์มเพิ่ม/แก้ไขผู้ใช้ */}
                 <div className={`p-5 rounded-xl border mb-8 transition-colors ${editingUserId ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-200'}`}>
                   <h3 className={`font-bold mb-4 flex items-center gap-2 ${editingUserId ? 'text-amber-700' : 'text-slate-700'}`}>
                     {editingUserId ? <Edit size={18}/> : <UserPlus size={18}/>} 
                     {editingUserId ? 'แก้ไขข้อมูลผู้ใช้งาน' : 'เพิ่มผู้ใช้งานใหม่'}
                   </h3>
                   <form onSubmit={handleSaveUser} className="grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                     <div className="space-y-1 md:col-span-2">
                       <label className="text-xs font-semibold text-slate-600">ชื่อ-สกุล</label>
                       <input required type="text" className="w-full p-2 text-sm rounded border outline-none focus:border-blue-500" placeholder="ชื่อพนักงาน" value={newUser.name} onChange={e => setNewUser({...newUser, name: e.target.value})} />
                     </div>
                     <div className="space-y-1 md:col-span-2">
                       <label className="text-xs font-semibold text-slate-600">อีเมล (@pwa.co.th)</label>
                       <input required type="email" className="w-full p-2 text-sm rounded border outline-none focus:border-blue-500" placeholder="อีเมลองค์กร" value={newUser.email} onChange={e => setNewUser({...newUser, email: e.target.value})} />
                     </div>
                     <div className="space-y-1">
                       <label className="text-xs font-semibold text-slate-600">เบอร์โทรศัพท์</label>
                       <input type="text" className="w-full p-2 text-sm rounded border outline-none focus:border-blue-500" placeholder="เบอร์โทร" value={newUser.phone} onChange={e => setNewUser({...newUser, phone: e.target.value})} />
                     </div>
                     <div className="space-y-1">
                       <label className="text-xs font-semibold text-slate-600">สิทธิ์การใช้งาน</label>
                       <select className="w-full p-2 text-sm rounded border outline-none focus:border-blue-500 bg-white" value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})}>
                         <option value="ผู้ใช้งานทั่วไป (User)">ผู้ใช้งานทั่วไป (User)</option>
                         <option value="ผู้ดูแลระบบ (Admin)">ผู้ดูแลระบบ (Admin)</option>
                         <option value="เจ้าหน้าที่ลงพื้นที่">เจ้าหน้าที่ลงพื้นที่</option>
                       </select>
                     </div>
                     <div className="md:col-span-6 flex gap-2 justify-end mt-2">
                       {editingUserId && (
                         <button type="button" onClick={handleCancelEditUser} className="bg-slate-200 text-slate-700 font-bold p-2 px-4 rounded hover:bg-slate-300 transition">ยกเลิก</button>
                       )}
                       <button type="submit" className={`${editingUserId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold p-2 px-6 rounded transition`}>
                         {editingUserId ? 'บันทึกการแก้ไข' : 'เพิ่มผู้ใช้'}
                       </button>
                     </div>
                   </form>
                 </div>

                 {/* ตารางรายชื่อผู้ใช้ */}
                 <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse text-sm">
                      <thead>
                        <tr className="bg-slate-800 text-white">
                          <th className="p-3 font-semibold rounded-tl-lg">ชื่อ-สกุล</th>
                          <th className="p-3 font-semibold">อีเมล (บัญชีผู้ใช้)</th>
                          <th className="p-3 font-semibold">เบอร์โทรศัพท์</th>
                          <th className="p-3 font-semibold">สิทธิ์การใช้งาน</th>
                          <th className="p-3 font-semibold text-center">สถานะ</th>
                          <th className="p-3 font-semibold text-center rounded-tr-lg">จัดการ</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {users.map(u => (
                          <tr key={u.id} className="hover:bg-slate-50">
                            <td className="p-3 font-bold text-slate-700">{u.name}</td>
                            <td className="p-3 text-blue-600">{u.email}</td>
                            <td className="p-3">{u.phone || '-'}</td>
                            <td className="p-3">
                              <span className={`px-2 py-1 rounded text-xs ${u.role.includes('Admin') || u.role.includes('ผู้ดูแลระบบ') ? 'bg-purple-100 text-purple-700 font-bold' : 'bg-slate-200 text-slate-700'}`}>
                                {u.role}
                              </span>
                            </td>
                            <td className="p-3 text-center"><span className="text-green-600 font-bold text-xs bg-green-50 px-2 py-1 rounded border border-green-200">{u.status}</span></td>
                            <td className="p-3">
                              <div className="flex justify-center gap-2">
                                <button onClick={() => handleEditUserClick(u)} className="p-1.5 text-amber-600 hover:bg-amber-100 rounded transition" title="แก้ไข">
                                  <Edit size={16}/>
                                </button>
                                <button onClick={() => handleDeleteUser(u.id)} className="p-1.5 text-red-600 hover:bg-red-100 rounded transition" title="ลบผู้ใช้">
                                  <Trash2 size={16}/>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                 </div>
              </div>
            )}

            {/* ==========================================
                VIEW: IMPORT DATA (Excel/CSV)
                ========================================== */}
            {view === 'import' && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 max-w-3xl mx-auto animate-in fade-in">
                 <div className="text-center mb-8">
                    <div className="bg-blue-50 text-blue-600 p-4 rounded-full inline-block mb-4">
                        <UploadCloud size={48} />
                    </div>
                    <h2 className="text-2xl font-bold text-slate-800">นำเข้าข้อมูลลูกหนี้ (Import CSV)</h2>
                    <p className="text-slate-500 mt-2">อัปโหลดไฟล์ตารางข้อมูล หากมีเลขผู้ใช้น้ำซ้ำในระบบ ระบบจะนำใบแจ้งหนี้ไปควบรวมให้อัตโนมัติ</p>
                 </div>

                 <div className="border-2 border-dashed border-slate-300 rounded-xl p-10 flex flex-col items-center justify-center bg-slate-50 hover:bg-slate-100 transition relative mb-6">
                    <FileSpreadsheet size={48} className="text-slate-400 mb-4" />
                    <p className="font-bold text-slate-700 text-lg mb-2">ลากไฟล์วางที่นี่ หรือ คลิกเพื่อเลือกไฟล์</p>
                    <p className="text-sm text-slate-500 mb-4">รองรับไฟล์ .csv เท่านั้น</p>
                    <button className="bg-slate-800 text-white px-6 py-2.5 rounded-lg font-bold shadow-md">เลือกไฟล์ในเครื่อง</button>
                    <input type="file" accept=".csv" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                 </div>

                 <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h4 className="font-bold text-blue-800 flex items-center gap-2 mb-2"><AlertTriangle size={16}/> คำแนะนำการเตรียมไฟล์แบบใหม่ (5 คอลัมน์)</h4>
                    <ul className="list-disc list-inside text-sm text-blue-700 space-y-1">
                        <li>คอลัมน์ A: "เลขที่ผู้ใช้น้ำ"</li>
                        <li>คอลัมน์ B: "ชื่อ-นามสกุล"</li>
                        <li>คอลัมน์ C: "หมายเลขใบแจ้งหนี้" (ถ้ามี)</li>
                        <li>คอลัมน์ D: "เดือนปีตั้งหนี้" (เช่น 2026-03)</li>
                        <li>คอลัมน์ E: "จำนวนเงินที่ค้างชำระ" (ตัวเลขเท่านั้น)</li>
                    </ul>
                    <p className="text-xs text-blue-600 mt-2">* บันทึกไฟล์เป็น CSV UTF-8 หรือ TIS-620</p>
                 </div>
              </div>
            )}

            {/* ==========================================
                VIEW: MONTHLY REPORT
                ========================================== */}
            {view === 'report-monthly' && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in">
                <div className="p-6 border-b border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-50">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Calendar className="text-blue-600"/> รายงานสรุปประจำเดือน สาขาละหานทราย</h2>
                  <div className="flex gap-2">
                    <button onClick={exportToCSV} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-green-700 shadow-md">
                        <FileSpreadsheet size={16}/> ส่งออก Excel
                    </button>
                    <button onClick={handlePrintPDF} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-slate-700 shadow-md">
                        <Printer size={16}/> พิมพ์ / บันทึก PDF
                    </button>
                  </div>
                </div>
                <div className="overflow-x-auto p-6">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-800 text-white">
                        <th className="p-3 font-semibold text-sm rounded-tl-lg">ประจำเดือน</th>
                        <th className="p-3 font-semibold text-sm text-center">จำนวนเป้าหมาย(ราย)</th>
                        <th className="p-3 font-semibold text-sm text-right">ยอดหนี้เป้าหมาย(บาท)</th>
                        <th className="p-3 font-semibold text-sm text-center">จัดเก็บได้(ราย)</th>
                        <th className="p-3 font-semibold text-sm text-right">ยอดจัดเก็บได้(บาท)</th>
                        <th className="p-3 font-semibold text-sm text-center rounded-tr-lg">คิดเป็น %</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      {monthlyStats.map((stat, idx) => {
                        const percent = stat.totalAmount > 0 ? ((stat.collectedAmount / stat.totalAmount) * 100).toFixed(2) : 0;
                        return (
                          <tr key={idx} className="hover:bg-slate-50">
                            <td className="p-3 font-bold text-blue-700">{stat.month}</td>
                            <td className="p-3 text-center">{stat.count}</td>
                            <td className="p-3 text-right font-mono">{stat.totalAmount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td className="p-3 text-center text-green-600 font-bold">{stat.collectedCount}</td>
                            <td className="p-3 text-right font-mono text-green-600 font-bold">{stat.collectedAmount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-1 rounded text-xs font-bold ${percent >= 50 ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                {percent}%
                              </span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot className="bg-slate-100 font-bold border-t-2 border-slate-300">
                      <tr>
                        <td className="p-3">รวมทั้งหมด</td>
                        <td className="p-3 text-center">{stats.totalCount}</td>
                        <td className="p-3 text-right">฿{stats.totalAmount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td className="p-3 text-center text-green-700">{stats.completedCount}</td>
                        <td className="p-3 text-right text-green-700">฿{stats.completedAmount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td className="p-3 text-center">{((stats.completedAmount/stats.totalAmount)*100).toFixed(2)}%</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              </div>
            )}

            {/* ==========================================
                VIEW: DATA LIST (TABLE)
                ========================================== */}
            {view === 'list' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="flex flex-col md:flex-row gap-3 bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                  <div className="relative flex-1">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                    <input 
                      type="text" placeholder="ค้นหาชื่อ หรือ เลขผู้ใช้น้ำ..."
                      className="w-full pl-10 pr-4 py-2.5 bg-slate-50 rounded-lg border-none focus:ring-2 focus:ring-blue-500 text-sm"
                      value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                  <div className="flex items-center gap-2 overflow-x-auto">
                    {['ทั้งหมด', 'ระหว่างติดตาม', 'ติดตามแล้ว'].map(status => (
                      <button key={status} onClick={() => setFilterOperation(status)}
                        className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap transition-colors ${filterOperation === status ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                        {status}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse min-w-[800px]">
                      <thead>
                        <tr className="bg-slate-50 border-b border-slate-200">
                          <th className="p-3 text-xs font-semibold text-slate-500">เลขผู้ใช้น้ำ/ชื่อ</th>
                          <th className="p-3 text-xs font-semibold text-slate-500 text-right">หนี้คงค้าง</th>
                          <th className="p-3 text-xs font-semibold text-slate-500 text-center">สถานะ</th>
                          <th className="p-3 text-xs font-semibold text-slate-500">ผลการติดตาม</th>
                          <th className="p-3 text-xs font-semibold text-slate-500 text-center">จัดการ</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 text-sm">
                        {filteredDebtors.map(debtor => (
                          <tr key={debtor.id} className="hover:bg-blue-50 transition-colors">
                            <td className="p-3 cursor-pointer" onClick={() => { setSelectedDebtor(debtor); setIsModalOpen(true); }}>
                              <div className="font-bold text-slate-800">{debtor.name}</div>
                              <div className="text-xs font-mono text-slate-500 mt-0.5">{debtor.accountId}</div>
                            </td>
                            <td className="p-3 text-right cursor-pointer" onClick={() => { setSelectedDebtor(debtor); setIsModalOpen(true); }}>
                              <div className="font-bold text-red-600">฿{debtor.amount.toLocaleString()}</div>
                              <div className="text-[10px] text-slate-500">ค้าง {debtor.overdueBills || (debtor.invoices ? debtor.invoices.length : 0)} ใบ</div>
                            </td>
                            <td className="p-3 text-center cursor-pointer" onClick={() => { setSelectedDebtor(debtor); setIsModalOpen(true); }}>
                              <span className={`px-2 py-1 rounded text-[10px] font-bold ${debtor.operationStatus === 'ติดตามแล้ว' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                {debtor.operationStatus}
                              </span>
                            </td>
                            <td className="p-3 cursor-pointer" onClick={() => { setSelectedDebtor(debtor); setIsModalOpen(true); }}>
                              <div className="font-bold text-slate-700">{debtor.trackingResult}</div>
                              <div className="text-[10px] text-slate-400">{debtor.trackingDate}</div>
                            </td>
                            <td className="p-3">
                              <div className="flex justify-center gap-2">
                                <button onClick={() => { setSelectedDebtor(debtor); setIsModalOpen(true); }} className="px-2 py-1.5 text-blue-600 hover:bg-blue-100 rounded flex items-center gap-1 transition-colors" title="ดูข้อมูล/พิมพ์">
                                    <FileText size={16}/>
                                    <span className="hidden lg:inline text-xs font-bold">ข้อมูล</span>
                                </button>
                                <button onClick={() => openForm(debtor)} className="px-2 py-1.5 text-amber-600 hover:bg-amber-100 rounded flex items-center gap-1 transition-colors" title="แก้ไข">
                                    <Edit size={16}/>
                                    <span className="hidden lg:inline text-xs font-bold">แก้ไข</span>
                                </button>
                                <button onClick={() => handleDelete(debtor.id)} className="px-2 py-1.5 text-red-600 hover:bg-red-100 rounded flex items-center gap-1 transition-colors" title="ลบข้อมูลรายการนี้">
                                    <Trash2 size={16}/>
                                    <span className="hidden lg:inline text-xs font-bold">ลบ</span>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* ==========================================
                VIEW: MAP
                ========================================== */}
            {view === 'map' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 animate-in fade-in">
                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><MapIcon className="text-blue-600"/> แผนที่จุดพิกัดลูกหนี้ ละหานทราย (จำลอง)</h3>
                <div className="relative h-[600px] bg-slate-100 rounded-lg overflow-hidden border border-slate-300">
                  <div className="absolute inset-0 opacity-20 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>
                  
                  {debtors.map(debtor => {
                    const top = `${Math.abs(debtor.lat * 10) % 80 + 10}%`; 
                    const left = `${Math.abs(debtor.lng * 10) % 80 + 10}%`;
                    return (
                      <button key={debtor.id} className="absolute transform -translate-x-1/2 -translate-y-full hover:scale-110 transition-transform z-10 group" style={{ top, left }} onClick={() => { setSelectedDebtor(debtor); setIsModalOpen(true); }}>
                        <div className="relative flex flex-col items-center">
                          <div className="bg-white p-2 rounded-lg shadow-xl border border-slate-200 mb-1 hidden group-hover:block absolute bottom-full whitespace-nowrap z-20">
                            <p className="text-xs font-bold text-slate-800">{debtor.name}</p>
                            <p className="text-[10px] text-red-600 font-bold">฿{debtor.amount.toLocaleString()}</p>
                          </div>
                          <MapPin size={32} fill={debtor.operationStatus === 'ติดตามแล้ว' ? '#16a34a' : '#ea580c'} className="text-white drop-shadow-md" />
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ==========================================
                VIEW: ADD/EDIT FORM
                ========================================== */}
            {view === 'form' && (
              <div className="bg-white rounded-xl shadow-md border border-slate-200 p-6 max-w-4xl mx-auto animate-in fade-in slide-in-from-bottom-4">
                <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    {editingId ? <Edit className="text-amber-600"/> : <Plus className="bg-blue-100 text-blue-600 p-1 rounded" size={28}/>} 
                    {editingId ? 'แก้ไขข้อมูลลูกหนี้' : 'เพิ่มรายการติดตามหนี้ใหม่'}
                  </h2>
                  <button onClick={() => setView('list')} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><X size={24}/></button>
                </div>
                
                <form onSubmit={handleSave} className="space-y-6 text-sm">
                   <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    {/* 1. ข้อมูลผู้ใช้น้ำ */}
                    <div className="space-y-4 md:col-span-2 bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <h3 className="font-bold text-blue-800 border-b pb-2 mb-4">1. ข้อมูลผู้ใช้น้ำ</h3>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="space-y-1">
                          <label className="font-semibold text-slate-700">เลขที่ผู้ใช้น้ำ *</label>
                          <input required type="text" className="w-full p-2.5 rounded-lg border focus:ring-2 outline-none" 
                            value={formData.accountId} onChange={e => setFormData({...formData, accountId: e.target.value})} />
                        </div>
                        <div className="space-y-1 md:col-span-2">
                          <label className="font-semibold text-slate-700">ชื่อ-นามสกุล *</label>
                          <input required type="text" className="w-full p-2.5 rounded-lg border focus:ring-2 outline-none" 
                            value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                        </div>
                        <div className="space-y-1 md:col-span-3">
                          <label className="font-semibold text-slate-700">ที่อยู่ตามสัญญา *</label>
                          <input required type="text" className="w-full p-2.5 rounded-lg border focus:ring-2 outline-none" 
                            value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                        </div>
                        <div className="space-y-1">
                          <label className="font-semibold text-slate-700">สถานะผู้ใช้น้ำ *</label>
                          <select required className="w-full p-2.5 rounded-lg border bg-white" 
                            value={formData.accountStatus} onChange={e => setFormData({...formData, accountStatus: e.target.value})}>
                            <option value="ปกติ (ค้างชำระ)">ปกติ (ค้างชำระ)</option>
                            <option value="งดจ่ายน้ำ">งดจ่ายน้ำ</option>
                            <option value="ยกเลิกสัญญา">ยกเลิกสัญญา</option>
                          </select>
                        </div>
                        {/* เพิ่มช่องกรอกเบอร์โทรศัพท์ */}
                        <div className="space-y-1 md:col-span-2">
                          <label className="font-semibold text-slate-700">เบอร์โทรศัพท์ติดต่อ</label>
                          <div className="relative">
                            <Phone size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input type="text" className="w-full pl-9 p-2.5 rounded-lg border focus:ring-2 outline-none" placeholder="08X-XXX-XXXX"
                              value={formData.phone || ''} onChange={e => setFormData({...formData, phone: e.target.value})} />
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* 2. รายการใบแจ้งหนี้ */}
                    <div className="space-y-4 md:col-span-2 bg-red-50 p-4 rounded-xl border border-red-100">
                       <h3 className="font-bold text-red-800 border-b border-red-200 pb-2 mb-4 flex justify-between items-center">
                         <span>2. รายการค้างชำระ (ใบแจ้งหนี้)</span>
                         <span className="text-xs font-normal text-red-600 bg-red-100 px-2 py-1 rounded">รวม {formData.invoices?.length || 0} ใบ | ยอดสุทธิ ฿{(formData.amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                       </h3>
                       
                       {/* ตารางแสดงใบแจ้งหนี้ที่เพิ่มแล้ว */}
                       {formData.invoices && formData.invoices.length > 0 && (
                         <div className="bg-white rounded border border-red-200 overflow-hidden mb-4">
                           <table className="w-full text-xs text-left">
                             <thead className="bg-red-100 text-red-800">
                               <tr>
                                 <th className="p-2 border-b border-red-200">ลำดับ</th>
                                 <th className="p-2 border-b border-red-200">หมายเลขใบแจ้งหนี้</th>
                                 <th className="p-2 border-b border-red-200 text-center">เดือนปีตั้งหนี้</th>
                                 <th className="p-2 border-b border-red-200 text-right">จำนวนเงิน (บาท)</th>
                                 <th className="p-2 border-b border-red-200 text-center">ลบ</th>
                               </tr>
                             </thead>
                             <tbody>
                               {formData.invoices.map((inv, idx) => (
                                 <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50">
                                   <td className="p-2 text-center">{idx + 1}</td>
                                   <td className="p-2 font-mono">{inv.invoiceNo}</td>
                                   <td className="p-2 text-center">{inv.billingMonth}</td>
                                   <td className="p-2 text-right font-bold text-red-600">{inv.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                   <td className="p-2 text-center">
                                     <button type="button" onClick={() => handleRemoveInvoice(idx)} className="text-red-400 hover:text-red-700"><Trash2 size={14}/></button>
                                   </td>
                                 </tr>
                               ))}
                             </tbody>
                           </table>
                         </div>
                       )}

                       {/* ฟอร์มย่อยสำหรับเพิ่มใบแจ้งหนี้ */}
                       <div className="grid grid-cols-1 md:grid-cols-4 gap-3 items-end bg-white p-3 rounded-lg border border-red-200">
                         <div className="space-y-1">
                           <label className="text-xs font-semibold text-slate-600">หมายเลขใบแจ้งหนี้</label>
                           <input type="text" className="w-full p-2 text-sm rounded border outline-none focus:border-red-400" placeholder="เช่น INV-12345"
                             value={tempInvoice.invoiceNo} onChange={e => setTempInvoice({...tempInvoice, invoiceNo: e.target.value})} />
                         </div>
                         <div className="space-y-1">
                           <label className="text-xs font-semibold text-slate-600">เดือนปีตั้งหนี้ (YYYY-MM)</label>
                           <input type="month" className="w-full p-2 text-sm rounded border outline-none focus:border-red-400" 
                             value={tempInvoice.billingMonth} onChange={e => setTempInvoice({...tempInvoice, billingMonth: e.target.value})} />
                         </div>
                         <div className="space-y-1">
                           <label className="text-xs font-semibold text-slate-600">จำนวนเงิน (บาท)</label>
                           <input type="number" step="0.01" className="w-full p-2 text-sm rounded border outline-none focus:border-red-400" placeholder="0.00"
                             value={tempInvoice.amount} onChange={e => setTempInvoice({...tempInvoice, amount: e.target.value})} />
                         </div>
                         <button type="button" onClick={handleAddTempInvoice} className="bg-red-100 text-red-700 font-bold p-2 text-sm rounded border border-red-200 hover:bg-red-200 flex justify-center items-center gap-1 transition">
                           <Plus size={16}/> เพิ่มใบแจ้งหนี้
                         </button>
                       </div>
                    </div>

                    {/* 3. ผลการลงพื้นที่ */}
                    <div className="space-y-4 md:col-span-2 bg-blue-50 p-4 rounded-xl border border-blue-100">
                       <h3 className="font-bold text-blue-800 border-b border-blue-200 pb-2 mb-4">3. ผลการลงพื้นที่ และ ภาพถ่าย</h3>
                       <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div className="space-y-1">
                            <label className="font-semibold text-slate-700">การดำเนินงาน *</label>
                            <select required className="w-full p-2.5 rounded-lg border bg-white"
                              value={formData.operationStatus} onChange={e => setFormData({...formData, operationStatus: e.target.value})}>
                              <option value="ระหว่างติดตาม">ระหว่างติดตาม</option>
                              <option value="ติดตามแล้ว">ติดตามแล้ว</option>
                            </select>
                          </div>
                          <div className="space-y-1">
                            <label className="font-semibold text-slate-700">ผลการเจรจา</label>
                            <select className="w-full p-2.5 rounded-lg border bg-white"
                              value={formData.trackingResult} onChange={e => setFormData({...formData, trackingResult: e.target.value})}>
                              <option value="ยังไม่พบตัว">ยังไม่พบตัว / บ้านปิด</option>
                              <option value="นัดชำระ">นัดชำระเงิน</option>
                              <option value="ชำระเงิน">ชำระเงินเรียบร้อย</option>
                              <option value="ปฏิเสธชำระ">ปฏิเสธการชำระ</option>
                            </select>
                          </div>
                          <div className="space-y-2 md:col-span-2 mt-2">
                            <label className="font-semibold text-slate-700 block">อัปโหลดภาพถ่าย</label>
                            <div className="grid grid-cols-2 gap-4">
                              <div className="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center hover:bg-white relative h-32">
                                {formData.photo1 ? (
                                  <><img src={formData.photo1} className="absolute inset-0 w-full h-full object-cover rounded-lg" /><button type="button" onClick={() => setFormData({...formData, photo1: ''})} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full z-10"><X size={12}/></button></>
                                ) : (
                                  <><Camera className="mx-auto text-slate-400 mb-1"/><p className="text-xs text-slate-500">ภาพที่ 1</p><input type="file" accept="image/*" onChange={(e) => handleImageChange(e, 'photo1')} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" /></>
                                )}
                              </div>
                               <div className="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center hover:bg-white relative h-32">
                                {formData.photo2 ? (
                                  <><img src={formData.photo2} className="absolute inset-0 w-full h-full object-cover rounded-lg" /><button type="button" onClick={() => setFormData({...formData, photo2: ''})} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full z-10"><X size={12}/></button></>
                                ) : (
                                  <><Camera className="mx-auto text-slate-400 mb-1"/><p className="text-xs text-slate-500">ภาพที่ 2</p><input type="file" accept="image/*" onChange={(e) => handleImageChange(e, 'photo2')} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" /></>
                                )}
                              </div>
                            </div>
                          </div>
                       </div>
                    </div>
                  </div>

                  <div className="pt-6 border-t border-slate-200 flex justify-end gap-3 sticky bottom-0 bg-white p-4 shadow-md md:shadow-none md:p-0">
                    <button type="button" onClick={() => setView('list')} className="px-6 py-3 rounded-lg font-bold text-slate-600 bg-slate-100 hover:bg-slate-200">ยกเลิก</button>
                    <button type="submit" className="px-8 py-3 rounded-lg font-bold text-white bg-blue-700 hover:bg-blue-800 shadow-lg flex items-center gap-2" disabled={formData.invoices?.length === 0}><Save size={20} /> บันทึก</button>
                  </div>
                </form>
              </div>
            )}
          </main>

          {/* ==========================================
              MODAL: DETAIL & QUICK ACTIONS
              ========================================== */}
          {isModalOpen && selectedDebtor && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200 max-h-[90vh] flex flex-col">
                <div className={`p-4 text-white flex justify-between items-center ${selectedDebtor.operationStatus === 'ติดตามแล้ว' ? 'bg-green-700' : 'bg-orange-600'}`}>
                  <div className="flex items-center gap-3">
                    <div className="bg-white/20 p-2 rounded-full"><User size={24} /></div>
                    <div>
                      <h3 className="text-lg font-bold">{selectedDebtor.name}</h3>
                      <p className="text-sm opacity-90 font-mono">ID: {selectedDebtor.accountId}</p>
                    </div>
                  </div>
                  <button onClick={() => setIsModalOpen(false)} className="bg-white/10 p-2 rounded-full hover:bg-white/20"><X size={20} /></button>
                </div>

                <div className="p-6 overflow-y-auto">
                  <div className="flex justify-between items-end mb-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div>
                      <p className="text-[10px] text-slate-500 font-bold uppercase">ยอดเงินค้างสุทธิ ({selectedDebtor.invoices?.length || selectedDebtor.overdueBills} ใบ)</p>
                      <p className="text-2xl font-black text-red-600">฿{selectedDebtor.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-[10px] text-slate-500 font-bold uppercase">เบอร์โทร / ผู้ลงพื้นที่</p>
                      <p className="text-xs font-bold text-slate-800">{selectedDebtor.phone || '-'}</p>
                      <p className="text-[10px] font-bold text-blue-600">{selectedDebtor.collectorEmail || 'ไม่ระบุ'}</p>
                    </div>
                  </div>

                  {/* แสดงรายการใบแจ้งหนี้ */}
                  {selectedDebtor.invoices && selectedDebtor.invoices.length > 0 && (
                    <div className="mb-4">
                      <h4 className="text-xs font-bold text-slate-500 uppercase mb-2">รายการใบแจ้งหนี้ที่ค้างชำระ</h4>
                      <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
                        <table className="w-full text-xs text-left">
                          <thead className="bg-slate-50 text-slate-600">
                            <tr>
                              <th className="p-2 border-b">เลขที่ใบแจ้งหนี้</th>
                              <th className="p-2 border-b text-center">เดือน/ปี</th>
                              <th className="p-2 border-b text-right">ยอด(฿)</th>
                            </tr>
                          </thead>
                          <tbody>
                            {selectedDebtor.invoices.map((inv, idx) => (
                              <tr key={idx} className="border-b border-slate-50">
                                <td className="p-2 font-mono text-slate-700">{inv.invoiceNo}</td>
                                <td className="p-2 text-center text-slate-600">{inv.billingMonth}</td>
                                <td className="p-2 text-right font-bold text-red-600">{inv.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* Action Grid */}
                  <div className="grid grid-cols-2 gap-3 mt-6">
                    <button onClick={() => { setView('report-individual'); setIsModalOpen(false); }} className="col-span-2 bg-slate-800 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-slate-900 transition shadow-md">
                      <Download size={18} /> ดาวน์โหลด PDF / พิมพ์รายงาน
                    </button>
                    <button onClick={() => openForm(selectedDebtor)} className="bg-amber-50 text-amber-700 border border-amber-200 py-2.5 rounded-xl font-bold text-sm flex justify-center items-center gap-2 hover:bg-amber-100">
                      <Edit size={16}/> แก้ไขข้อมูล
                    </button>
                    <button onClick={() => handleDelete(selectedDebtor.id)} className="bg-red-50 text-red-700 border border-red-200 py-2.5 rounded-xl font-bold text-sm flex justify-center items-center gap-2 hover:bg-red-100">
                      <Trash2 size={16}/> ลบข้อมูล
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Mobile Navigation */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 md:hidden flex justify-around p-2 z-[60] shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] pb-safe no-print overflow-x-auto">
            <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 rounded-xl min-w-[60px] ${view === 'dashboard' ? 'text-blue-700' : 'text-slate-400'}`}><PieChart size={20} /><span className="text-[10px] mt-1 font-bold">สรุป</span></button>
            <button onClick={() => setView('list')} className={`flex flex-col items-center p-2 rounded-xl min-w-[60px] ${view === 'list' ? 'text-blue-700' : 'text-slate-400'}`}><BarChart3 size={20} /><span className="text-[10px] mt-1 font-bold">หนี้</span></button>
            <button onClick={() => openForm()} className={`flex flex-col items-center p-2 rounded-xl min-w-[60px] ${view === 'form' ? 'bg-blue-50 text-blue-700' : 'text-slate-400'}`}><Plus size={24} className={view === 'form' ? 'bg-blue-600 text-white rounded-full p-1' : ''} /><span className="text-[10px] mt-1 font-bold">เพิ่ม</span></button>
            <button onClick={() => setView('users')} className={`flex flex-col items-center p-2 rounded-xl min-w-[60px] ${view === 'users' ? 'text-blue-700' : 'text-slate-400'}`}><Users size={20} /><span className="text-[10px] mt-1 font-bold">ทีมงาน</span></button>
          </nav>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
